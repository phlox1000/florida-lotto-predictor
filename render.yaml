# Render Blueprint (Infrastructure-as-Code) for florida-lotto-predictor.
#
# This file documents the current shape of the live web service and cron
# job on Render, checked in so changes to service configuration go through
# PR review instead of living as dashboard-only state.
#
# IMPORTANT: The existing services were created manually via the dashboard,
# NOT as a Blueprint instance:
#   - Web:  srv-d73mp2gule4c73ekcri0  (florida-lotto-predictor)
#   - Cron: crn-d7j80r9o3t8c73bkpr30 (florida-lotto-autofetch)
# Committing this file does not automatically link the two. To bring the live service
# under Blueprint management, you must either:
#
#   1. (Recommended, zero risk) Leave this file as reference-only IaC.
#      It documents the service shape for disaster-recovery / re-creation,
#      and any drift between this file and live config is a warning sign
#      worth investigating, but Render will not try to reconcile them.
#
#   2. (When ready) Create a new Blueprint instance in the Render dashboard
#      pointed at this repo. This will spin up a *second* service from
#      this file. You would then migrate traffic and delete the old
#      service. This is a real migration with downtime risk and is
#      deliberately left as a separate future decision.
#
# Any change to this file should be verified against `get_service` output
# via the Render API/MCP to ensure it still matches reality.
#
# Spec reference: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: florida-lotto-predictor
    runtime: node
    plan: standard
    region: ohio
    branch: main

    # Manual-only deploys. We keep auto-deploy off so a merged PR sits on
    # `main` until a human pushes "Deploy latest commit" in the dashboard,
    # giving us one last checkpoint (and time to run the production migration
    # step when a PR adds one) before a rollout goes live.
    #
    # Prefer autoDeployTrigger over deprecated autoDeploy (Blueprint spec).
    autoDeployTrigger: "off"

    # Added in PR #29. Render will only route traffic to a new container
    # once GET /healthz returns 200 on it. Enables true zero-downtime
    # rollouts and auto-rollback on a failing new container.
    healthCheckPath: /healthz

    # Scaled to 2 in-flight (dashboard) for HA after the in-process scraper
    # was extracted to the Render cron job in PR #31. The rate-limit store
    # was moved to Redis in the Phase A PR (see REDIS_URL below), so running
    # >1 pod no longer undercounts request rates.
    numInstances: 2

    # pnpm is pinned to 10.4.1 to match packageManager in package.json.
    # Installing globally in the build command avoids Corepack signature
    # mismatch issues that bit an earlier fix/* branch.
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install && pnpm build
    startCommand: pnpm run start

    # Environment variables: declared here so the required set is
    # documented and review-able. Values are NOT committed - they live in
    # the Render dashboard under the service's Environment tab.
    # `sync: false` tells Render "this key exists, I am managing its value
    # out-of-band" and prevents accidental overwrites from this file.
    envVars:
      - key: NODE_ENV
        value: production

      # Database (required). PostgreSQL connection string.
      - key: DATABASE_URL
        sync: false

      # Auth: HMAC secret for signing JWT session cookies.
      - key: JWT_SECRET
        sync: false

      # Manus/Forge integration identifiers and credentials.
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false

      # Optional. Connection string for a Render Key Value (Redis-compatible)
      # instance. When unset, server/lib/rateLimiter.ts falls back to an
      # in-memory Map, which is correct for local dev and safe (but per-pod)
      # in single-instance deployments. Required once rate limits are wired
      # onto routes AND numInstances > 1 — otherwise each pod runs its own
      # independent counter and the effective limit is maxRequests × pods.
      #
      # Render's internal hostname form looks like:
      #   redis://<user>:<pass>@<service-id>.ohio-internal-redis.render.com:6379
      # which is populated automatically when a Key Value service in the
      # same region is linked via the dashboard's "Connect" flow.
      - key: REDIS_URL
        sync: false

  # Standalone lottery auto-fetch (PR #31). Same repo/branch/build as web;
  # startCommand runs once per schedule tick then exits.
  #
  # Auto-deploy MUST stay off to match the web service: otherwise a merge to
  # main deploys cron immediately while the web pods still run the previous
  # image (manual deploy), causing schema/code skew until someone deploys web.
  - type: cron
    name: florida-lotto-autofetch
    runtime: node
    plan: starter
    region: ohio
    branch: main
    autoDeployTrigger: "off"
    schedule: "0 */6 * * *"
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install && pnpm build
    startCommand: pnpm run cron
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
